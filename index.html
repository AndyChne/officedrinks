<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>辦公室飲料揪團</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-6 min-h-screen relative">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ⚠️ 請在這裡貼上你的 Google Apps Script 網頁應用程式網址
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwGvnPjgtisXYmK0f8oVlBa_PaMD0wiwRUu67xawazaDidfUwcoJw4Oy_U0wsbQ9gRfgA/exec";

    function DrinkOrderApp() {
      const [isLoading, setIsLoading] = useState(true);
      const [isAdmin, setIsAdmin] = useState(false);
      const [sysSettings, setSysSettings] = useState({ status: 'open', date: '', shop: '' });
      
      // 儲存從試算表抓下來的所有選單
      const [menuOptions, setMenuOptions] = useState({ items: [], sizes: [], sweetnesses: [], ices: [], toppings: [] });
      
      const [myOrders, setMyOrders] = useState([]); 
      const [allOrdersSummary, setAllOrdersSummary] = useState([]);
      const [isSubmitting, setIsSubmitting] = useState(false);
      
      const [formData, setFormData] = useState({
        name: '', item: '', size: '', sweetness: '', ice: '', topping: ''
      });
      const [customTopping, setCustomTopping] = useState(''); // 專門儲存「其他」的加料內容

      // 網頁載入時，抓取「設定」與「所有選單」
      useEffect(() => {
        fetch(GAS_WEB_APP_URL)
          .then(res => res.json())
          .then(data => {
            if (data.status === "success") {
              const options = data.menuOptions;
              setMenuOptions(options);
              setSysSettings(data.settings);
              
              // 設定表單的預設值為試算表的第一個選項
              setFormData({
                name: '',
                item: options.items[0] || '',
                size: options.sizes[0] || '',
                sweetness: options.sweetnesses[0] || '',
                ice: options.ices[0] || '',
                topping: options.toppings[0] || '無'
              });
            }
          })
          .catch(err => console.error(err))
          .finally(() => setIsLoading(false));
      }, []);

      const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      // 【一般使用者】送出訂單
      const handleSubmit = async (e) => {
        e.preventDefault();
        
        // --- 嚴格驗證所有選項 ---
        if (!formData.name.trim()) return alert('請輸入姓名！');
        if (!formData.item) return alert('請選擇飲品品項！');
        if (!formData.size) return alert('請選擇容量！');
        if (!formData.sweetness) return alert('請選擇甜度！');
        if (!formData.ice) return alert('請選擇冰量！');
        if (!formData.topping) return alert('請選擇加料（若無請選"無"）！');
        
        // 驗證加料的「其他」欄位
        if (formData.topping === '其他' && !customTopping.trim()) {
          return alert('請輸入你想加的配料名稱！');
        }

        // 決定最終要送出的加料內容
        const finalTopping = formData.topping === '其他' ? customTopping.trim() : formData.topping;
        const payload = { ...formData, topping: finalTopping, action: 'submitOrder' };

        setIsSubmitting(true);
        try {
          await fetch(GAS_WEB_APP_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          setMyOrders(prev => [...prev, { ...payload, id: Date.now() }]);
          setFormData(prev => ({ ...prev, name: '' })); // 清空姓名，保留其他選項方便連點
          setCustomTopping(''); // 清空自訂加料
          alert('訂單已送出！');
        } catch (error) {
          alert('傳送失敗，請聯絡主揪！');
        } finally {
          setIsSubmitting(false);
        }
      };

      // 【主揪功能】儲存系統設定
      const handleSaveSettings = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        try {
          await fetch(GAS_WEB_APP_URL, {
            method: 'POST', mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...sysSettings, action: 'updateSettings' })
          });
          alert('設定已更新！其他人重新整理網頁就會看到新狀態。');
        } catch (error) {
          alert('更新失敗');
        } finally {
          setIsSubmitting(false);
        }
      };

      // 【主揪功能】載入所有人的訂單總表
      const loadSummary = async () => {
        try {
          const res = await fetch(GAS_WEB_APP_URL + "?action=getSummary");
          const data = await res.json();
          if (data.status === "success") {
            const summary = {};
            data.data.forEach(order => {
              // 總表合併時，把加料也列入區分條件
              const key = `${order.item} | ${order.size} | ${order.sweetness} | ${order.ice} | +${order.topping}`;
              if (summary[key]) {
                summary[key].count += 1;
                summary[key].names.push(order.name);
              } else {
                summary[key] = { ...order, count: 1, names: [order.name] };
              }
            });
            setAllOrdersSummary(Object.values(summary).sort((a, b) => b.count - a.count));
          }
        } catch (error) {
          alert('無法載入總表，請確認連線。');
        }
      };

      const triggerAdminLogin = () => {
        const pwd = prompt("請輸入主揪密碼：");
        if (pwd === "8888") setIsAdmin(true);
        else if (pwd !== null) alert("密碼錯誤");
      };

      if (isLoading) return <div class="text-center mt-20 text-gray-500">系統載入中...</div>;

      // 準備加料的選項 (自動在最後補上「其他」)
      const toppingOptions = [...menuOptions.toppings];
      if (!toppingOptions.includes('其他')) toppingOptions.push('其他');

      return (
        <div class="max-w-4xl mx-auto space-y-6 pb-20">
          
          <div class="bg-white p-6 rounded-lg shadow-md flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
              <p class="text-sm text-blue-600 font-bold mb-1">{sysSettings.date} 揪團</p>
              <h1 class="text-2xl font-bold text-gray-800">🧋 {sysSettings.shop}</h1>
            </div>
            <div>
              {sysSettings.status === 'open' 
                ? <span class="bg-green-100 text-green-700 px-4 py-2 rounded-full font-bold text-sm">🟢 收單中，請填寫</span>
                : <span class="bg-red-100 text-red-700 px-4 py-2 rounded-full font-bold text-sm">🛑 已結單，停止點餐</span>
              }
            </div>
          </div>

          {!isAdmin ? (
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-bold mb-4 border-b pb-2 text-gray-700">新增我的訂單</h2>
                {sysSettings.status === 'open' ? (
                  <form onSubmit={handleSubmit} class="space-y-4">
                    <div>
                      <label class="block text-sm font-medium text-gray-700">姓名 <span class="text-red-500">*</span></label>
                      <input type="text" name="name" value={formData.name} onChange={handleChange} class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500" placeholder="你的名字" disabled={isSubmitting}/>
                    </div>
                    <div>
                      <label class="block text-sm font-medium text-gray-700">飲品品項 <span class="text-red-500">*</span></label>
                      <select name="item" value={formData.item} onChange={handleChange} class="mt-1 block w-full rounded-md border p-2 bg-white" disabled={isSubmitting}>
                        <option value="" disabled>請選擇飲品...</option>
                        {menuOptions.items.map((item, i) => <option key={i} value={item}>{item}</option>)}
                      </select>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                      <div>
                        <label class="block text-sm text-gray-700">容量 <span class="text-red-500">*</span></label>
                        <select name="size" value={formData.size} onChange={handleChange} class="mt-1 block w-full rounded-md border p-2 bg-white">
                          <option value="" disabled>選擇容量</option>
                          {menuOptions.sizes.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                      <div>
                        <label class="block text-sm text-gray-700">冰量 <span class="text-red-500">*</span></label>
                        <select name="ice" value={formData.ice} onChange={handleChange} class="mt-1 block w-full rounded-md border p-2 bg-white">
                          <option value="" disabled>選擇冰量</option>
                          {menuOptions.ices.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                      <div>
                        <label class="block text-sm text-gray-700">甜度 <span class="text-red-500">*</span></label>
                        <select name="sweetness" value={formData.sweetness} onChange={handleChange} class="mt-1 block w-full rounded-md border p-2 bg-white">
                          <option value="" disabled>選擇甜度</option>
                          {menuOptions.sweetnesses.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                      <div>
                        <label class="block text-sm text-gray-700">加料 <span class="text-red-500">*</span></label>
                        <select name="topping" value={formData.topping} onChange={handleChange} class="mt-1 block w-full rounded-md border p-2 bg-white">
                          <option value="" disabled>選擇加料</option>
                          {toppingOptions.map(t => <option key={t} value={t}>{t}</option>)}
                        </select>
                      </div>
                    </div>

                    {/* 當選擇「其他」時，顯示文字輸入框 */}
                    {formData.topping === '其他' && (
                      <div class="p-3 bg-blue-50 rounded-md border border-blue-100">
                        <label class="block text-sm text-blue-800 font-medium">✏️ 請輸入想加的配料</label>
                        <input type="text" value={customTopping} onChange={e => setCustomTopping(e.target.value)} class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border focus:ring-blue-500" placeholder="例如：雙份布丁、西米露" disabled={isSubmitting}/>
                      </div>
                    )}

                    <button type="submit" disabled={isSubmitting} class="w-full text-white bg-blue-600 hover:bg-blue-700 py-3 px-4 rounded-md font-bold transition-colors mt-4">
                      {isSubmitting ? '傳送中...' : '送出訂單'}
                    </button>
                  </form>
                ) : (
                  <div class="text-center py-10 text-gray-500"><p class="text-lg font-semibold">主揪已經收單囉 🛑</p></div>
                )}
              </div>

              <div class="bg-white p-6 rounded-lg shadow-md max-h-[500px] overflow-y-auto">
                <h2 class="text-xl font-bold mb-4 border-b pb-2 text-gray-700">本次點餐明細</h2>
                {myOrders.length === 0 ? (
                  <p class="text-gray-400 text-center py-8">送出後，這裡會顯示你點的飲料。</p>
                ) : (
                  <ul class="divide-y divide-gray-200">
                    {myOrders.map(order => (
                      <li key={order.id} class="py-3">
                        <p class="font-bold text-gray-800">{order.name}</p>
                        <p class="text-sm text-gray-500">{order.item} ({order.size}) / {order.sweetness} / {order.ice}</p>
                        {order.topping !== '無' && <p class="text-sm text-blue-600 font-medium">+ {order.topping}</p>}
                      </li>
                    ))}
                  </ul>
                )}
              </div>
            </div>
          ) : (
            <div class="space-y-6">
              <div class="bg-gray-800 text-white p-6 rounded-lg shadow-md border-t-4 border-yellow-400">
                <h2 class="text-xl font-bold mb-4 text-yellow-400">⚙️ 主揪控制面板</h2>
                <form onSubmit={handleSaveSettings} class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                  <div>
                    <label class="block text-sm text-gray-300 mb-1">開團日期</label>
                    <input type="text" value={sysSettings.date} onChange={e => setSysSettings({...sysSettings, date: e.target.value})} class="w-full p-2 rounded text-black" placeholder="例如：2023/10/05" />
                  </div>
                  <div>
                    <label class="block text-sm text-gray-300 mb-1">飲料店名</label>
                    <input type="text" value={sysSettings.shop} onChange={e => setSysSettings({...sysSettings, shop: e.target.value})} class="w-full p-2 rounded text-black" placeholder="例如：50嵐" />
                  </div>
                  <div>
                    <label class="block text-sm text-gray-300 mb-1">收單狀態</label>
                    <select value={sysSettings.status} onChange={e => setSysSettings({...sysSettings, status: e.target.value})} class="w-full p-2 rounded text-black font-bold">
                      <option value="open">🟢 開放填寫中</option>
                      <option value="closed">🛑 關閉收單</option>
                    </select>
                  </div>
                  <button type="submit" disabled={isSubmitting} class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-4 rounded w-full">
                    {isSubmitting ? '儲存中...' : '儲存發布'}
                  </button>
                </form>
              </div>

              <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                  <h2 class="text-xl font-bold text-gray-800">📝 最終點餐總表 (同規格合併)</h2>
                  <button onClick={loadSummary} class="bg-blue-100 text-blue-700 hover:bg-blue-200 px-4 py-1 rounded text-sm font-bold">
                    🔄 載入/更新全部訂單
                  </button>
                </div>
                
                <div class="overflow-x-auto">
                  <table class="min-w-full text-left text-sm whitespace-nowrap border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-200">
                      <tr>
                        <th class="px-4 py-3 border-r font-medium text-gray-600">飲品名稱</th>
                        <th class="px-4 py-3 border-r font-medium text-gray-600">規格說明 (大小/甜/冰)</th>
                        <th class="px-4 py-3 border-r font-medium text-blue-600">加料</th>
                        <th class="px-4 py-3 border-r font-medium text-blue-600 text-center">總數量</th>
                        <th class="px-4 py-3 font-medium text-gray-600">點餐人名單</th>
                      </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                      {allOrdersSummary.length === 0 ? (
                        <tr><td colSpan="5" class="px-4 py-8 text-center text-gray-400">點擊上方按鈕載入最新總表，或目前無人點餐。</td></tr>
                      ) : (
                        allOrdersSummary.map((row, idx) => (
                          <tr key={idx} class="hover:bg-gray-50">
                            <td class="px-4 py-4 border-r font-semibold text-gray-800">{row.item}</td>
                            <td class="px-4 py-4 border-r text-gray-500">{row.size} / {row.sweetness} / {row.ice}</td>
                            <td class="px-4 py-4 border-r text-blue-600 font-medium">{row.topping === '無' ? '-' : `+ ${row.topping}`}</td>
                            <td class="px-4 py-4 border-r text-center font-bold text-lg text-blue-600">{row.count} 杯</td>
                            <td class="px-4 py-4 text-gray-500 text-xs whitespace-normal max-w-xs">{row.names.join(', ')}</td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          )}

          <div class="absolute bottom-4 right-4">
             {!isAdmin && (
               <button onClick={triggerAdminLogin} class="text-xs text-gray-300 hover:text-gray-500 transition-colors">
                 ⚙️ 管理員登入
               </button>
             )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DrinkOrderApp />);
  </script>
</body>
</html>
